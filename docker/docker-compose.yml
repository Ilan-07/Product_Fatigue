version: '3.8'

services:
  # 1. Inference API
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow-server:5000
    volumes:
      - ../models:/app/models
      - ../outputs:/app/outputs
      - ../data/processed:/app/data/processed
    depends_on:
      - mlflow-server
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # 2. MLflow Tracking Server
  mlflow-server:
    image: python:3.13-slim
    ports:
      - "5001:5000"
    volumes:
      - mlflow-data:/mlruns
    command: >
      sh -c "pip install mlflow &&
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlruns/mlflow.db
      --artifacts-destination /mlruns/artifacts
      --serve-artifacts"

  # 3. Prometheus (Metrics scraper)
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  # 4. Grafana (Dashboard)
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

  # 5. Frontend Dashboard (React + Vite)
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  mlflow-data:
