server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend
    location /dashboard/api/ {
        proxy_pass http://api:8000/dashboard/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /predict/ {
        proxy_pass http://api:8000/predict/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /v1/ {
        proxy_pass http://api:8000/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /v2/ {
        proxy_pass http://api:8000/v2/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        proxy_pass http://api:8000/health;
        proxy_set_header Host $host;
    }

    location /pipeline/ {
        proxy_pass http://api:8000/pipeline/;
        proxy_set_header Host $host;
    }

    location /model/ {
        proxy_pass http://api:8000/model/;
        proxy_set_header Host $host;
    }

    location /metrics {
        proxy_pass http://api:8000/metrics;
        proxy_set_header Host $host;
    }
}
